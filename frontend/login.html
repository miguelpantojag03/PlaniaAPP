<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion | Plania</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-visual" aria-label="Resumen de Plania">
            <a class="brand auth-brand" href="index.html">
                <span class="brand-mark">P</span>
                <span>Plania</span>
            </a>
            <div class="auth-visual-content">
                <p class="eyebrow">Bienvenido de nuevo</p>
                <h1>Decide tu siguiente tarea con calma.</h1>
                <p>Tu dashboard inteligente te espera con prioridades, energia y recomendaciones claras para hoy.</p>
            </div>
        </section>

        <section class="auth-panel" aria-labelledby="login-title">
            <div class="auth-card">
                <div class="auth-card-header">
                    <p class="eyebrow">Acceso</p>
                    <h2 id="login-title">Iniciar sesion</h2>
                    <p>Ingresa con tu correo para continuar organizando tu dia.</p>
                </div>

                <form id="loginForm" class="auth-form" novalidate>
                    <div class="form-field">
                        <label for="email">Correo electronico</label>
                        <input id="email" name="email" type="email" autocomplete="email" placeholder="tu@correo.com">
                        <small class="field-error" data-error-for="email"></small>
                    </div>

                    <div class="form-field">
                        <label for="password">Contrasena</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Tu contrasena">
                        <small class="field-error" data-error-for="password"></small>
                    </div>

                    <button class="button button-primary button-full" type="submit">
                        <span class="button-text">Iniciar sesion</span>
                        <span class="button-loader" aria-hidden="true"></span>
                    </button>
                </form>

                <p class="auth-switch">No tienes cuenta? <a href="register.html">Crear cuenta</a></p>
            </div>
        </section>
    </main>

    <div id="toastHost" class="toast-host" aria-live="polite"></div>

    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/session.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
