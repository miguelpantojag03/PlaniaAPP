spring.application.name=Plania

spring.datasource.url=${PLANIA_DB_URL:jdbc:postgresql://localhost:5432/plania_db}
spring.datasource.username=${PLANIA_DB_USERNAME:postgres}
spring.datasource.password=${PLANIA_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${PLANIA_DDL_AUTO:update}
spring.jpa.show-sql=${PLANIA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${PLANIA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}

app.jwt.secret=${PLANIA_JWT_SECRET:Y2hhbmdlLXRoaXMtc2VjcmV0LWluLXByb2R1Y3Rpb24tcGxhbmlhLWp3dC1zaWduYXR1cmU=}
app.jwt.expiration-ms=${PLANIA_JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${PLANIA_CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173,http://localhost:3000}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
